<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="500" fill="#f5f5f0"/>
  
  <!-- Goal Post -->
  <g id="goal">
    <!-- Left post -->
    <rect x="80" y="120" width="8" height="120" fill="#8B6914" stroke="#5c3317" stroke-width="1"/>
    <!-- Right post -->
    <rect x="172" y="120" width="8" height="120" fill="#8B6914" stroke="#5c3317" stroke-width="1"/>
    <!-- Top bar -->
    <rect x="80" y="120" width="100" height="8" fill="#8B6914" stroke="#5c3317" stroke-width="1"/>
    
    <!-- Net -->
    <g stroke="#333" stroke-width="1" fill="none" opacity="0.6">
      <!-- Vertical lines -->
      <line x1="88" y1="128" x2="88" y2="240"/>
      <line x1="100" y1="128" x2="96" y2="240"/>
      <line x1="112" y1="128" x2="104" y2="240"/>
      <line x1="124" y1="128" x2="112" y2="240"/>
      <line x1="136" y1="128" x2="120" y2="240"/>
      <line x1="148" y1="128" x2="128" y2="240"/>
      <line x1="160" y1="128" x2="136" y2="240"/>
      <line x1="172" y1="128" x2="144" y2="240"/>
      
      <!-- Horizontal lines -->
      <path d="M 88 140 Q 128 142 172 140" stroke="#333" stroke-width="0.8" fill="none"/>
      <path d="M 85 160 Q 128 165 175 160" stroke="#333" stroke-width="0.8" fill="none"/>
      <path d="M 82 180 Q 128 188 178 180" stroke="#333" stroke-width="0.8" fill="none"/>
      <path d="M 80 200 Q 128 210 180 200" stroke="#333" stroke-width="0.8" fill="none"/>
      <path d="M 80 220 Q 128 230 180 220" stroke="#333" stroke-width="0.8" fill="none"/>
    </g>
  </g>
  
  <!-- Soccer Ball -->
  <g id="ball" transform="translate(200, 280)">
    <!-- Ball base -->
    <circle cx="0" cy="0" r="35" fill="#D2B48C" stroke="#8B7355" stroke-width="1.5"/>
    <!-- Pentagon pattern -->
    <polygon points="0,-20 19,-6 12,16 -12,16 -19,-6" fill="none" stroke="#333" stroke-width="1"/>
    <polygon points="0,-20 19,-6 12,16 -12,16 -19,-6" fill="#333" opacity="0.3"/>
    <!-- Hexagon patterns -->
    <circle cx="-15" cy="-8" r="3" fill="#333" opacity="0.5"/>
    <circle cx="15" cy="-8" r="3" fill="#333" opacity="0.5"/>
    <circle cx="0" cy="8" r="3" fill="#333" opacity="0.5"/>
  </g>
  
  <!-- Boy sitting on ball -->
  <g id="boy" transform="translate(200, 240)">
    <!-- Legs -->
    <rect x="-8" y="20" width="6" height="35" fill="#C17A5C" rx="3"/>
    <rect x="2" y="20" width="6" height="35" fill="#C17A5C" rx="3"/>
    
    <!-- Shoes -->
    <ellipse cx="-5" cy="60" rx="6" ry="5" fill="#4A3728"/>
    <ellipse cx="5" cy="60" rx="6" ry="5" fill="#4A3728"/>
    
    <!-- Socks -->
    <rect x="-8" y="48" width="6" height="12" fill="#E8D5B7"/>
    <rect x="2" y="48" width="6" height="12" fill="#E8D5B7"/>
    <!-- Sock stripes -->
    <line x1="-8" y1="52" x2="-2" y2="52" stroke="#C17A5C" stroke-width="1"/>
    <line x1="-8" y1="56" x2="-2" y2="56" stroke="#C17A5C" stroke-width="1"/>
    <line x1="2" y1="52" x2="8" y2="52" stroke="#C17A5C" stroke-width="1"/>
    <line x1="2" y1="56" x2="8" y2="56" stroke="#C17A5C" stroke-width="1"/>
    
    <!-- Shorts -->
    <path d="M -12 20 Q -12 15 -8 12 L 8 12 Q 12 15 12 20" fill="#1a3a52" stroke="#0d2133" stroke-width="1"/>
    <!-- Shorts stripes -->
    <line x1="-10" y1="12" x2="-10" y2="20" stroke="#E8A500" stroke-width="1.5"/>
    <line x1="-2" y1="12" x2="-2" y2="20" stroke="#E8A500" stroke-width="1.5"/>
    <line x1="6" y1="12" x2="6" y2="20" stroke="#E8A500" stroke-width="1.5"/>
    
    <!-- Shirt -->
    <path d="M -12 12 L -16 -2 Q -16 -8 -10 -10 L 10 -10 Q 16 -8 16 -2 L 12 12" fill="#D4A574" stroke="#8B6914" stroke-width="1"/>
    <!-- Shirt sleeve stripe -->
    <rect x="-18" y="-6" width="4" height="10" fill="#C17A5C" rx="2"/>
    <rect x="14" y="-6" width="4" height="10" fill="#C17A5C" rx="2"/>
    
    <!-- Arms -->
    <rect x="-20" y="-4" width="5" height="20" fill="#C17A5C" rx="2.5" transform="rotate(-25 -17.5 6)"/>
    <rect x="15" y="-4" width="5" height="20" fill="#C17A5C" rx="2.5" transform="rotate(25 17.5 6)"/>
    
    <!-- Hands -->
    <circle cx="-22" cy="12" r="4" fill="#C17A5C"/>
    <circle cx="22" cy="12" r="4" fill="#C17A5C"/>
    
    <!-- Neck -->
    <rect x="-5" y="-12" width="10" height="4" fill="#C17A5C"/>
    
    <!-- Head -->
    <circle cx="0" cy="-22" r="12" fill="#C17A5C" stroke="#8B6914" stroke-width="1"/>
    
    <!-- Hair -->
    <path d="M -10 -28 Q -12 -35 -8 -38 Q 0 -40 8 -38 Q 12 -35 10 -28" fill="#1a1a1a"/>
    <path d="M -8 -30 Q -6 -32 0 -32 Q 6 -32 8 -30" fill="#3a2a1a" opacity="0.4"/>
    
    <!-- Face -->
    <!-- Eyes -->
    <circle cx="-4" cy="-24" r="1.5" fill="#000"/>
    <circle cx="4" cy="-24" r="1.5" fill="#000"/>
    
    <!-- Nose -->
    <line x1="0" y1="-22" x2="0" y2="-19" stroke="#000" stroke-width="0.8"/>
    
    <!-- Mouth -->
    <path d="M -2 -17 Q 0 -15 2 -17" stroke="#000" stroke-width="0.8" fill="none"/>
  </g>
  
  <!-- Text "La Mejenga" -->
  <g id="text" transform="translate(200, 420)">
    <defs>
      <style>
        .mejenga-text {
          font-family: Georgia, serif;
          font-size: 48px;
          font-weight: bold;
          fill: #8B4513;
          text-anchor: middle;
          letter-spacing: 2px;
        }
      </style>
    </defs>
    <text class="mejenga-text" x="0" y="0">La Mejenga</text>
    
    <!-- Decorative line under text -->
    <line x1="-100" y1="15" x2="100" y2="15" stroke="#8B4513" stroke-width="2"/>
    <line x1="-100" y1="18" x2="100" y2="18" stroke="#8B4513" stroke-width="0.5" opacity="0.6"/>
  </g>
</svg>