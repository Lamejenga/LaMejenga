<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            gap: 10px;
            flex: 1;
            min-width: 300px;
            max-width: 500px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            background: rgba(255,255,255,0.9);
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            color: #667eea;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .weather-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .weather-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
        }

        .city-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .country {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .temperature {
            font-size: 3rem;
            font-weight: 700;
            color: #667eea;
        }

        .weather-icon {
            width: 80px;
            height: 80px;
        }

        .description {
            font-size: 1.1rem;
            color: #666;
            text-transform: capitalize;
            margin-bottom: 20px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .detail-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .detail-label {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
        }

        .error-message {
            background: rgba(255, 77, 77, 0.95);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .forecast-section {
            margin-top: 30px;
        }

        .forecast-title {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .forecast-item {
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s;
        }

        .forecast-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .forecast-day {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .forecast-icon {
            width: 50px;
            height: 50px;
            margin: 10px auto;
        }

        .forecast-temp {
            font-size: 1.2rem;
            color: #667eea;
            font-weight: 600;
        }

        .no-data {
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: #888;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .search-box {
                flex-direction: column;
                min-width: 100%;
                max-width: 100%;
            }

            .weather-grid {
                grid-template-columns: 1fr;
            }

            .weather-main {
                flex-direction: column;
                text-align: center;
            }

            .temperature {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get real-time weather information for any location</p>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Enter city name..." 
                    onkeypress="handleKeyPress(event)"
                >
                <button onclick="searchWeather()">Search</button>
                <button onclick="getLocationWeather()">📍 My Location</button>
            </div>
        </div>

        <div id="errorContainer"></div>
        <div id="weatherContainer"></div>
        <div id="forecastContainer"></div>
    </div>

    <script>
        const API_KEY = 'e7d02c3ba0b93ea5ba8919c84e23c6ad';
        const WEATHER_API_URL = 'https://api.openweathermap.org/data/2.5/weather';
        const FORECAST_API_URL = 'https://api.openweathermap.org/data/2.5/forecast';

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                searchWeather();
            }
        }

        function showError(message) {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `<div class="error-message">⚠️ ${message}</div>`;
        }

        function clearError() {
            document.getElementById('errorContainer').innerHTML = '';
        }

        function showLoading() {
            document.getElementById('weatherContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            `;
        }

        async function fetchWeatherData(lat, lon, isForecast = false) {
            try {
                const url = isForecast 
                    ? `${FORECAST_API_URL}?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
                    : `${WEATHER_API_URL}?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error('Failed to fetch weather data');
                }
                
                return await response.json();
            } catch (error) {
                console.error('Error:', error);
                throw error;
            }
        }

        async function searchWeather() {
            const cityInput = document.getElementById('cityInput').value.trim();
            
            if (!cityInput) {
                showError('Please enter a city name');
                return;
            }

            clearError();
            showLoading();

            try {
                const geoResponse = await fetch(
                    `https://api.openweathermap.org/geo/1.0/direct?q=${cityInput}&limit=1&appid=${API_KEY}`
                );
                
                if (!geoResponse.ok) {
                    throw new Error('City not found');
                }

                const geoData = await geoResponse.json();
                
                if (!geoData.length) {
                    showError('City not found. Please try another search.');
                    document.getElementById('weatherContainer').innerHTML = '';
                    return;
                }

                const { lat, lon, name, country } = geoData[0];
                await displayWeather(lat, lon, name, country);
            } catch (error) {
                showError('Error searching for city. Please try again.');
                document.getElementById('weatherContainer').innerHTML = '';
            }
        }

        async function getLocationWeather() {
            clearError();
            showLoading();

            if (!navigator.geolocation) {
                showError('Geolocation is not supported by your browser');
                document.getElementById('weatherContainer').innerHTML = '';
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const { latitude, longitude } = position.coords;
                    try {
                        const reverseGeoResponse = await fetch(
                            `https://api.openweathermap.org/geo/1.0/reverse?lat=${latitude}&lon=${longitude}&limit=1&appid=${API_KEY}`
                        );
                        
                        const reverseGeoData = await reverseGeoResponse.json();
                        const { name, country } = reverseGeoData[0] || { name: 'Your Location', country: '' };
                        
                        await displayWeather(latitude, longitude, name, country);
                    } catch (error) {
                        showError('Error getting location weather. Please try again.');
                        document.getElementById('weatherContainer').innerHTML = '';
                    }
                },
                (error) => {
                    showError('Unable to access your location. Please enable location access.');
                    document.getElementById('weatherContainer').innerHTML = '';
                }
            );
        }

        async function displayWeather(lat, lon, cityName, country) {
            try {
                const weatherData = await fetchWeatherData(lat, lon, false);
                const forecastData = await fetchWeatherData(lat, lon, true);

                const { main, weather, wind, clouds, sys } = weatherData;
                const { temp, feels_like, humidity, pressure } = main;
                const iconCode = weather[0].icon;
                const iconUrl = `https://openweathermap.org/img/wn/${iconCode}@4x.png`;

                const weatherHTML = `
                    <div class="weather-grid">
                        <div class="weather-card">
                            <div class="city-name">${cityName}</div>
                            <div class="country">${country}</div>
                            <div class="weather-main">
                                <div class="temperature">${Math.round(temp)}°C</div>
                                <img src="${iconUrl}" alt="${weather[0].main}" class="weather-icon">
                            </div>
                            <div class="description">${weather[0].main} - ${weather[0].description}</div>
                            <div class="weather-details">
                                <div class="detail-item">
                                    <div class="detail-label">Feels Like</div>
                                    <div class="detail-value">${Math.round(feels_like)}°C</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">Humidity</div>
                                    <div class="detail-value">${humidity}%</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">Wind Speed</div>
                                    <div class="detail-value">${wind.speed} m/s</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">Pressure</div>
                                    <div class="detail-value">${pressure} hPa</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">Cloud Coverage</div>
                                    <div class="detail-value">${clouds.all}%</div>
                                </div>
                                <div class="detail-item">
                                    <div class="detail-label">Visibility</div>
                                    <div class="detail-value">${(weatherData.visibility / 1000).toFixed(1)} km</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                document.getElementById('weatherContainer').innerHTML = weatherHTML;
                displayForecast(forecastData);
            } catch (error) {
                showError('Error fetching weather data. Please try again.');
                document.getElementById('weatherContainer').innerHTML = '';
            }
        }

        function displayForecast(forecastData) {
            const daily = {};
            
            forecastData.list.forEach(item => {
                const date = new Date(item.dt * 1000).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                if (!daily[date]) {
                    daily[date] = item;
                }
            });

            const forecastItems = Object.entries(daily).slice(0, 5).map(([date, data]) => {
                const iconUrl = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;
                const temp = Math.round(data.main.temp);
                return `
                    <div class="forecast-item">
                        <div class="forecast-day">${date}</div>
                        <img src="${iconUrl}" alt="${data.weather[0].main}" class="forecast-icon">
                        <div class="forecast-temp">${temp}°C</div>
                        <div style="font-size: 0.9rem; color: #666; text-transform: capitalize;">
                            ${data.weather[0].main}
                        </div>
                    </div>
                `;
            }).join('');

            const forecastHTML = `
                <div class="forecast-section">
                    <div class="forecast-title">5-Day Forecast</div>
                    <div class="forecast-grid">
                        ${forecastItems}
                    </div>
                </div>
            `;

            document.getElementById('forecastContainer').innerHTML = forecastHTML;
        }

        // Load default city on page load
        window.addEventListener('load', () => {
            document.getElementById('cityInput').value = 'London';
            searchWeather();
        });
    </script>
</body>
</html>
